site_name: ÁgoraLab
site_description: Um blog pessoal sobre tecnologia e outras ideias
site_url: https://luciodias.github.io/blog

theme:
  name: material
  language: pt-BR
  palette:
    scheme: slate
    primary: green
    accent: green
  features:
    - navigation.indexes

plugins:
  - search
  - blog:
      blog_toc: true
      archive_date_format: MMMM yyyy
      categories_allowed:
        - Tecnologia
        - Viagens
        - Pessoal
      authors_profiles: true
      authors_profiles_name: Autores
      pagination_per_page: 5
      archive_pagination_per_page: 10
      categories_pagination_per_page: 10
  - meta
  - tags
  - rss:
      match_path: "blog/posts/.*"
      date_from_meta:
        as_creation: date.created
        as_update: date.updated

extra:
  analytics:
    provider: google
    property: G-VY4RDYYYPJ
  social:
    - icon: fontawesome/brands/github
      name: luciodias no GitHub
      link: https://github.com/luciodias

extra_css:
  - assets/stylesheets/extra.css

hooks:
  - hooks/socialmedia.py

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Início: index.md
  - Tags: tags.md
  - Blog:
     - blog/index.md
     - blog/tags.md
